services:
  postgres:
    image: postgres:16-alpine
    container_name: clinical-ordering-postgres
    environment:
      POSTGRES_DB: clinical_ordering
      POSTGRES_USER: clinical_user
      POSTGRES_PASSWORD: clinical_pass
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U clinical_user -d clinical_ordering"]
      interval: 10s
      timeout: 5s
      retries: 5

  keycloak:
    image: quay.io/keycloak/keycloak:25.0
    container_name: clinical-ordering-keycloak
    profiles:
      - auth
    command:
      - start-dev
      - --http-port=8081
      - --import-realm
    environment:
      KC_BOOTSTRAP_ADMIN_USERNAME: admin
      KC_BOOTSTRAP_ADMIN_PASSWORD: admin
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
    ports:
      - "8081:8081"
    volumes:
      - ./infra/keycloak/clinical-ordering-realm.json:/opt/keycloak/data/import/clinical-ordering-realm.json:ro

volumes:
  postgres-data:
